# Hexo Configuration
# Docs: https://hexo.io/docs/configuration.html

title: Zihan Zhou's Blog
subtitle: "Learning notes, engineering practice, and AI + Energy explorations"
description: "这里是 Summer 周子涵的技术博客，记录学习笔记、工程实践与 AI+能源探索。"
keywords: Summer,周子涵,技术博客,AI,能源,学习笔记
author: Summer
language: zh-CN
timezone: Asia/Shanghai

url: https://summerzhouzihan.github.io
root: /techblog/
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

new_post_name: :year-:month-:day-:title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ""
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ""
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ""

index_generator:
  path: ""
  per_page: 10
  order_by: -date

default_category: uncategorized
category_map:
tag_map:

meta_generator: true

date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: mtime

per_page: 10
pagination_dir: page

theme: fluid

search:
  path: local-search.xml
  field: post
  content: true
  format: html

markdown:
  plugins:
    - "@traptitech/markdown-it-katex"

deploy:
  type: ""
